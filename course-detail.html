<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết khóa học — EduCourse</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">🎓 EduCourse</a>
  <div class="nav-links"><a href="index.html">← Quay lại</a></div>
</nav>

<div class="container page">
  <div id="content"><div class="empty-state"><div class="icon">⏳</div>Đang tải...</div></div>
</div>

<!-- Modal Mua hàng -->
<div class="modal-overlay" id="buy-modal">
  <div class="modal">
    <h2>🛒 Xác nhận mua khóa học</h2>
    <div id="modal-info"></div>
    <div style="background:#FEF3C7;padding:12px;border-radius:8px;margin:16px 0;font-size:0.88rem;">
      ⚠️ <strong>Demo Mode:</strong> Đây là mock payment — nhấn xác nhận để đăng ký ngay, không cần thanh toán thật.
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-primary" onclick="confirmBuy()">✅ Xác nhận đăng ký</button>
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const courseId = urlParams.get('id');
let courseData = null;

async function loadCourse() {
    const res = await apiFetch('/courses/' + courseId);
    if (!res.ok) { document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">❌</div>Không tìm thấy khóa học</div>'; return; }

    courseData = res.data.course;
    const lessons = res.data.lessons;
    const user = getUser();

    // Check đã mua chưa
    let enrolled = false;
    if (user?.role === 'Student') {
        const checkRes = await apiFetch('/enrollments/check/' + courseId);
        if (checkRes.ok) enrolled = checkRes.data.enrolled;
    }

    document.getElementById('content').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start;">
          <div>
            <div style="font-size:0.85rem;color:var(--primary);font-weight:600;margin-bottom:8px;">${courseData.categoryName}</div>
            <h1 style="font-size:1.8rem;color:var(--primary-dark);margin-bottom:12px;">${courseData.title}</h1>
            <p style="color:var(--gray);line-height:1.7;margin-bottom:20px;">${courseData.description}</p>
            <div style="display:flex;gap:20px;font-size:0.88rem;color:var(--gray);margin-bottom:28px;">
              <span>👨‍🏫 ${courseData.instructorName}</span>
              <span>📚 ${courseData.totalLessons} bài học</span>
              <span>👥 ${courseData.totalEnrollments} học viên</span>
            </div>

            <h3 style="font-size:1.1rem;color:var(--primary-dark);margin-bottom:12px;">📋 Nội dung khóa học</h3>
            <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">
              ${lessons.map((l, i) => `
                <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:0.88rem;">
                  <span style="color:var(--primary);font-weight:700;min-width:24px;">${i+1}.</span>
                  <span>🎬 ${l.title}</span>
                </div>
              `).join('')}
              ${!lessons.length ? '<div style="padding:20px;text-align:center;color:var(--gray);">Chưa có bài học</div>' : ''}
            </div>
          </div>

          <div class="card" style="position:sticky;top:80px;">
            <img src="${courseData.thumbnailUrl || 'https://via.placeholder.com/340x180/2E86AB/white?text=' + encodeURIComponent(courseData.title)}" style="width:100%;height:180px;object-fit:cover;">
            <div class="card-body">
              <div style="font-size:1.8rem;font-weight:800;color:var(--primary);margin-bottom:16px;">
                ${courseData.price === 0 ? 'Miễn phí' : courseData.price.toLocaleString('vi-VN') + ' ₫'}
              </div>
              ${enrolled
                ? `<a href="learn.html?course=${courseId}" class="btn btn-success btn-block">▶ Vào học ngay</a>`
                : user?.role === 'Student'
                  ? `<button class="btn btn-primary btn-block" onclick="openBuyModal()">🛒 Mua khóa học</button>`
                  : !user
                    ? `<a href="login.html" class="btn btn-primary btn-block">Đăng nhập để mua</a>`
                    : `<div style="text-align:center;color:var(--gray);font-size:0.88rem;">Đăng nhập với tài khoản Student để mua</div>`
              }
            </div>
          </div>
        </div>
    `;
}

function openBuyModal() {
    document.getElementById('modal-info').innerHTML = `
        <div style="padding:16px;background:var(--light);border-radius:8px;">
            <div style="font-weight:700;font-size:1rem;color:var(--primary-dark);">${courseData.title}</div>
            <div style="color:var(--gray);font-size:0.88rem;margin-top:4px;">👨‍🏫 ${courseData.instructorName}</div>
            <div style="font-size:1.3rem;font-weight:800;color:var(--primary);margin-top:8px;">
                ${courseData.price === 0 ? 'Miễn phí' : courseData.price.toLocaleString('vi-VN') + ' ₫'}
            </div>
        </div>`;
    document.getElementById('buy-modal').classList.add('open');
}
function closeModal() { document.getElementById('buy-modal').classList.remove('open'); }

async function confirmBuy() {
    const res = await apiFetch('/enrollments/enroll/' + courseId, { method: 'POST' });
    closeModal();
    if (res.ok) {
        toast('🎉 ' + res.data.message);
        setTimeout(() => window.location.href = 'learn.html?course=' + courseId, 1200);
    } else {
        toast(res.data?.message || 'Lỗi!', 'error');
    }
}

loadCourse();
</script>
</body></html>
