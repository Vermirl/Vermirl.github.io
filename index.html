<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCourse — Trang chủ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">🎓 EduCourse</a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="container page">
  <!-- Hero -->
  <div style="background:linear-gradient(135deg,#1E3A5F,#2E86AB);color:white;padding:40px;border-radius:16px;margin-bottom:32px;text-align:center;">
    <h1 style="font-size:2rem;margin-bottom:8px;">Học Online Mọi Lúc Mọi Nơi 🚀</h1>
    <p style="opacity:0.85;margin-bottom:20px;">Hàng trăm khóa học chất lượng với video bài giảng và quiz tương tác</p>
    <a href="register.html" class="btn btn-accent">Bắt đầu học miễn phí</a>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input id="search" class="form-control" placeholder="🔍 Tìm khóa học..." oninput="filterCourses()">
    <select id="cat-filter" class="form-control" style="max-width:200px;" onchange="filterCourses()">
      <option value="">Tất cả danh mục</option>
    </select>
  </div>

  <div class="section-header">
    <h2 class="page-title" style="margin:0;">Khóa học nổi bật</h2>
    <span id="course-count" style="color:#6B7280;font-size:0.9rem;"></span>
  </div>

  <div id="course-grid" class="course-grid">
    <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
let allCourses = [];

// Render navbar
function renderNav() {
    const user = getUser();
    const nav = document.getElementById('nav-links');
    if (!user) {
        nav.innerHTML = `<a href="login.html">Đăng nhập</a><a href="register.html" class="btn btn-accent btn-sm">Đăng ký</a>`;
    } else if (user.role === 'Student') {
        nav.innerHTML = `<a href="index.html" class="active">Khóa học</a><a href="my-courses.html">Học của tôi</a>
            <span class="user-badge">${user.name}</span><button class="btn-logout" onclick="logout()">Đăng xuất</button>`;
    } else if (user.role === 'Instructor') {
        nav.innerHTML = `<a href="index.html">Khóa học</a><a href="instructor.html">Dashboard</a>
            <span class="user-badge">👨‍🏫 ${user.name}</span><button class="btn-logout" onclick="logout()">Đăng xuất</button>`;
    } else {
        nav.innerHTML = `<a href="admin.html">Admin Panel</a>
            <span class="user-badge">⚙️ Admin</span><button class="btn-logout" onclick="logout()">Đăng xuất</button>`;
    }
}

async function loadCategories() {
    const res = await apiFetch('/categories');
    if (res.ok) {
        const sel = document.getElementById('cat-filter');
        res.data.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
    }
}

async function loadCourses() {
    const res = await apiFetch('/courses');
    if (res.ok) {
        allCourses = res.data;
        renderCourses(allCourses);
    }
}

function filterCourses() {
    const search = document.getElementById('search').value.toLowerCase();
    const catId = document.getElementById('cat-filter').value;
    const filtered = allCourses.filter(c => {
        const matchSearch = c.title.toLowerCase().includes(search) || c.description.toLowerCase().includes(search);
        const matchCat = !catId || c.categoryId == catId;
        return matchSearch && matchCat;
    });
    renderCourses(filtered);
}

function renderCourses(courses) {
    const grid = document.getElementById('course-grid');
    document.getElementById('course-count').textContent = `${courses.length} khóa học`;
    if (!courses.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div>Không tìm thấy khóa học nào</div>`;
        return;
    }
    grid.innerHTML = courses.map(c => `
        <div class="card course-card" onclick="window.location='course-detail.html?id=${c.id}'">
            <img src="${c.thumbnailUrl || 'https://via.placeholder.com/320x160/2E86AB/white?text=' + encodeURIComponent(c.title)}" alt="${c.title}">
            <div class="card-body">
                <div style="font-size:0.78rem;color:var(--primary);font-weight:600;margin-bottom:4px;">${c.categoryName}</div>
                <div class="card-title">${c.title}</div>
                <div style="font-size:0.82rem;color:var(--gray);margin-bottom:8px;">👨‍🏫 ${c.instructorName}</div>
                <div class="price">${c.price === 0 ? 'Miễn phí' : c.price.toLocaleString('vi-VN') + ' ₫'}</div>
                <div class="meta">
                    <span>📚 ${c.totalLessons} bài</span>
                    <span>👥 ${c.totalEnrollments} học viên</span>
                </div>
            </div>
        </div>
    `).join('');
}

renderNav();
loadCategories();
loadCourses();
</script>
</body></html>
