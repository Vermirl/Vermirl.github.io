<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký — EduCourse</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>🎓 EduCourse</h1>
    <p>Tạo tài khoản miễn phí</p>

    <div class="form-group">
      <label>Họ và tên</label>
      <input id="fullname" class="form-control" placeholder="Nguyễn Văn A">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" class="form-control" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input id="password" type="password" class="form-control" placeholder="Tối thiểu 6 ký tự">
    </div>
    <div class="form-group">
      <label>Vai trò</label>
      <select id="role" class="form-control">
        <option value="Student">🎓 Học viên (Student)</option>
        <option value="Instructor">👨‍🏫 Giảng viên (Instructor)</option>
      </select>
    </div>
    <div id="error-msg" class="error-msg" style="margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary btn-block" onclick="doRegister()">Đăng ký</button>
    <div class="auth-divider">— đã có tài khoản? —</div>
    <a href="login.html" class="btn btn-outline btn-block">Đăng nhập</a>
  </div>
</div>
<script src="js/api.js"></script>
<script>
async function doRegister() {
    const fullName = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!fullName || !email || !password) { errEl.textContent = 'Vui lòng nhập đầy đủ.'; errEl.style.display='block'; return; }
    if (password.length < 6) { errEl.textContent = 'Mật khẩu tối thiểu 6 ký tự.'; errEl.style.display='block'; return; }

    const res = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ fullName, email, password, role })
    });

    if (res.ok) {
        saveAuth(res.data);
        window.location.href = role === 'Instructor' ? 'instructor.html' : 'index.html';
    } else {
        errEl.textContent = res.data?.message || 'Đăng ký thất bại.';
        errEl.style.display = 'block';
    }
}
</script>
</body></html>
