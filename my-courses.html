<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học của tôi — EduCourse</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">🎓 EduCourse</a>
  <div class="nav-links">
    <a href="index.html">Khóa học</a>
    <a href="my-courses.html" class="active">Học của tôi</a>
    <span class="user-badge" id="user-badge"></span>
    <button class="btn-logout" onclick="logout()">Đăng xuất</button>
  </div>
</nav>

<div class="container page">
  <h1 class="page-title">📚 Khóa học của tôi</h1>
  <div id="enrollments-grid" class="course-grid">
    <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
  </div>
</div>

<!-- Certificate Modal -->
<div class="modal-overlay" id="cert-modal">
  <div class="modal" style="max-width:700px;">
    <div id="cert-content"></div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:center;">
      <button class="btn btn-primary" onclick="printCert()">🖨️ In / Tải PDF</button>
      <button class="btn btn-outline" onclick="document.getElementById('cert-modal').classList.remove('open')">Đóng</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
requireAuth(['Student']);
document.getElementById('user-badge').textContent = getUser()?.name || '';

async function loadEnrollments() {
    const res = await apiFetch('/enrollments/my');
    const grid = document.getElementById('enrollments-grid');
    if (!res.ok || !res.data.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="icon">📭</div>
            <div>Bạn chưa đăng ký khóa học nào</div>
            <a href="index.html" class="btn btn-primary" style="margin-top:16px;">Khám phá khóa học</a>
        </div>`;
        return;
    }

    grid.innerHTML = res.data.map(e => `
        <div class="card">
            <img src="${e.thumbnailUrl || 'https://via.placeholder.com/320x160/2E86AB/white?text=Course'}" style="width:100%;height:160px;object-fit:cover;">
            <div class="card-body">
                <div class="card-title">${e.courseTitle}</div>
                <div style="margin:10px 0;">
                    <div style="display:flex;justify-content:space-between;font-size:0.82rem;color:var(--gray);margin-bottom:6px;">
                        <span>Tiến độ</span><span>${e.progressPercent}%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${e.progressPercent}%"></div></div>
                </div>
                ${e.isCompleted
                    ? `<div style="color:var(--success);font-size:0.85rem;font-weight:700;margin-bottom:10px;">🏆 Đã hoàn thành!</div>`
                    : ''
                }
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <a href="learn.html?course=${e.courseId}" class="btn btn-primary btn-sm">
                        ${e.progressPercent > 0 ? '▶ Tiếp tục học' : '▶ Bắt đầu học'}
                    </a>
                    ${e.isCompleted
                        ? `<button class="btn btn-accent btn-sm" onclick="viewCertificate(${e.id})">🏆 Chứng chỉ</button>`
                        : ''
                    }
                </div>
            </div>
        </div>
    `).join('');
}

async function viewCertificate(enrollmentId) {
    const res = await apiFetch('/enrollments/certificate/' + enrollmentId);
    if (!res.ok) { toast(res.data?.message || 'Lỗi!', 'error'); return; }

    const d = res.data;
    const date = new Date(d.completedAt).toLocaleDateString('vi-VN', { year:'numeric', month:'long', day:'numeric' });

    document.getElementById('cert-content').innerHTML = `
        <div class="certificate-box" id="certificate-print">
            <div style="font-size:0.9rem;color:var(--gray);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;">Certificate of Completion</div>
            <h1 style="font-size:1.5rem;color:var(--gray);">🎓 EduCourse</h1>
            <div style="border-top:2px solid var(--accent);border-bottom:2px solid var(--accent);padding:16px 0;margin:20px 0;">
                <div style="color:var(--gray);font-size:0.9rem;">Chứng nhận rằng</div>
                <div class="name">${d.studentName}</div>
                <div style="color:var(--gray);font-size:0.9rem;">đã hoàn thành xuất sắc khóa học</div>
                <div style="font-size:1.4rem;font-weight:800;color:var(--primary-dark);margin-top:8px;">${d.courseTitle}</div>
            </div>
            <div style="color:var(--gray);font-size:0.88rem;">Giảng viên: <strong>${d.instructorName}</strong></div>
            <div style="color:var(--gray);font-size:0.88rem;margin-top:4px;">Ngày hoàn thành: <strong>${date}</strong></div>
            <div style="margin-top:20px;color:#aaa;font-size:0.78rem;">Mã chứng chỉ: CERT-${d.enrollmentId.toString().padStart(6,'0')}</div>
        </div>`;
    document.getElementById('cert-modal').classList.add('open');
}

function printCert() { window.print(); }

loadEnrollments();
</script>
</body></html>
